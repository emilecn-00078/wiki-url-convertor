<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>維基百科網址產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0e10; --surface:#17171a; --surface2:#1f1f24;
    --border:#2e2e36; --accent:#c8a96e; --accent2:#7eb8c9;
    --text:#e8e3d8; --muted:#7a7870; --success:#6fcf8e; --error:#e07070;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;min-height:100vh;padding:40px 24px;}
  header{text-align:center;margin-bottom:40px;}
  .logo-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--accent);border:1px solid var(--accent);padding:4px 12px;margin-bottom:16px;opacity:.8;}
  h1{font-size:clamp(20px,4vw,34px);font-weight:300;letter-spacing:.04em;line-height:1.3;}
  h1 em{font-style:normal;color:var(--accent);}
  .subtitle{margin-top:8px;font-size:13px;color:var(--muted);}
  .input-section{max-width:720px;margin:0 auto 36px;}
  .input-label{font-size:12px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--accent);margin-bottom:10px;display:block;}
  textarea{width:100%;height:180px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;line-height:1.7;padding:16px 18px;resize:vertical;outline:none;transition:border-color .2s;}
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--muted);font-size:12px;}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;font-family:'DM Mono',monospace;}
  .btn-row{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;align-items:center;}
  .btn{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1.5px;padding:10px 24px;border-radius:3px;cursor:pointer;border:none;transition:all .2s;}
  .btn-primary{background:var(--accent);color:#0e0e10;font-weight:500;}
  .btn-primary:hover:not(:disabled){background:#d9bc82;transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,169,110,.25);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--muted);color:var(--text);}
  .count-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}
  .results-section{max-width:1100px;margin:0 auto;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .results-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
  .results-title{font-size:13px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--accent2);}
  .copy-all-btn{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;padding:6px 16px;background:transparent;border:1px solid var(--accent2);color:var(--accent2);border-radius:3px;cursor:pointer;transition:all .2s;}
  .copy-all-btn:hover{background:var(--accent2);color:#0e0e10;}
  .table-wrapper{overflow-x:auto;border:1px solid var(--border);border-radius:6px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead tr{background:var(--surface2);border-bottom:1px solid var(--border);}
  thead th{padding:12px 16px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);font-weight:400;white-space:nowrap;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--surface2);}
  td{padding:12px 16px;vertical-align:middle;}
  .td-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:36px;}
  .td-name{font-weight:600;white-space:nowrap;min-width:90px;}
  .url-cell{display:flex;align-items:center;gap:8px;}
  .url-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent2);word-break:break-all;flex:1;}
  .url-text.zh{color:var(--accent);}
  .url-text.loading{color:var(--muted);font-style:italic;}
  .url-text.not-found{color:var(--error);}
  .copy-btn{flex-shrink:0;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;transition:all .15s;}
  .copy-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .copy-btn.copied{border-color:var(--success);color:var(--success);}
  .copy-btn:disabled{opacity:.3;cursor:not-allowed;}
  .progress-wrap{max-width:1100px;margin:0 auto 16px;}
  .progress-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:6px;}
  .progress-bg{background:var(--surface2);border-radius:99px;height:4px;overflow:hidden;}
  .progress-fill{background:var(--accent);height:100%;border-radius:99px;transition:width .3s;}
  .placeholder{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;font-family:'DM Mono',monospace;letter-spacing:1px;border:1px dashed var(--border);border-radius:6px;max-width:1100px;margin:0 auto;}
  .placeholder-icon{font-size:32px;margin-bottom:16px;opacity:.4;}
  a{color:inherit;text-decoration:none;}
</style>
</head>
<body>

<header>
  <div class="logo-badge">WIKI · URL · GENERATOR</div>
  <h1>維基百科<em>網址</em>產生器</h1>
  <p class="subtitle">自動生成中英文維基百科頁面連結，支援批量輸入，無需 API Key</p>
</header>

<div class="input-section">
  <label class="input-label" for="namesInput">輸入名稱</label>
  <textarea id="namesInput"
    placeholder="每行一個名稱，例如：&#10;谷歌&#10;愛因斯坦&#10;居里夫人&#10;Newton&#10;Shakespeare&#10;諸葛亮"
    spellcheck="false"></textarea>
  <div class="hint">每行一個 · 支援中英文混合 · 點擊🔗可直接跳轉到對應英文維基頁面</div>
  <div class="btn-row">
    <button class="btn btn-primary" id="generateBtn" onclick="generate()">產 生 網 址</button>
    <button class="btn btn-ghost" onclick="clearAll()">清 除</button>
    <span class="count-badge" id="countBadge"></span>
  </div>
</div>

<div id="output"></div>

<script>
function isAscii(str) { return /^[\x00-\x7F]+$/.test(str.trim()); }

function encodeZhTitle(name) {
  return name.trim().split(' ').join('_').split('').map(ch => {
    if (/[A-Za-z0-9\-_.~]/.test(ch)) return ch;
    return encodeURIComponent(ch);
  }).join('');
}
function buildZhUrl(name) { return `https://zh.wikipedia.org/wiki/${encodeZhTitle(name)}`; }
function buildEnUrl(name) {
  // Use Wikipedia's cross-language redirect - works for any language input
  return `https://zh.wikipedia.org/wiki/Special:GoToLinkedPage/en/${encodeZhTitle(name)}`;
}
